<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support | dqmjrka</title>
    <style>
        body {
            background-color: #f5f5f7;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, system-ui, sans-serif;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        .support-btn {
            background: #ffffff;
            border-radius: 28px;
            padding: 25px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .support-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.1);
        }

        .top-text {
            font-weight: 700;
            font-size: 22px;
            color: #1d1d1f;
            margin-bottom: 4px;
        }

        .mid-text {
            font-size: 13px;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .val-text {
            font-size: 16px;
            color: #21a038;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            letter-spacing: 1px;
            pointer-events: none; /* Запрет на выделение/звонок */
            word-break: break-all;
            max-width: 100%;
        }

        /* Стиль для ЕРИП (счет обычно длиннее, уменьшим шрифт) */
        .erip-val {
            font-size: 13px;
        }

        #copy-toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 50px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            transform: translateX(-50%);
            bottom: 30px;
            font-size: 15px;
            opacity: 0;
            transition: opacity 0.3s, bottom 0.3s;
        }

        #copy-toast.show {
            visibility: visible;
            opacity: 1;
            bottom: 50px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="support-btn" onclick="copyValue('9112380179107778', 'Беларусбанк')">
            <span class="top-text">Беларусбанк❤️</span>
            <span class="mid-text">Номер карты</span>
            <span class="val-text">9112 3801 7910 7778</span>
        </div>

        <div class="support-btn" onclick="copyValue('5326580001442349', 'Приорбанк')">
            <span class="top-text">Приорбанк🧡</span>
            <span class="mid-text">Номер карты</span>
            <span class="val-text">5326 5800 0144 2349</span>
        </div>

        <div class="support-btn" onclick="copyValue('BY81PJCB30141720081012774933', 'ЕРИП')">
            <span class="top-text">ЕРИП💙 (ПриорБанк)</span>
            <span class="mid-text">Номер счета</span>
            <span class="val-text erip-val">BY81 PJCB 3014 1720 0810 1277 4933</span>
        </div>
    </div>

    <div id="copy-toast">Скопировано!</div>

    <script>
        function copyValue(value, name) {
            navigator.clipboard.writeText(value).then(() => {
                const toast = document.getElementById("copy-toast");
                toast.innerText = name + " скопирован!";
                toast.classList.add("show");
                
                setTimeout(() => {
                    toast.classList.remove("show");
                }, 2000);
            });
        }
    </script>

</body>
</html>
