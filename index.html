<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support</title>
    <style>
        body {
            background-color: #f5f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            font-family: -apple-system, system-ui, sans-serif;
        }

        .support-btn {
            background: #ffffff;
            border-radius: 28px;
            padding: 30px 50px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
            user-select: none;
        }

        .support-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 35px rgba(0,0,0,0.1);
        }

        .top-text {
            display: block;
            font-weight: 700;
            font-size: 22px;
            color: #1d1d1f;
            margin-bottom: 4px;
        }

        .mid-text {
            display: block;
            font-size: 14px;
            color: #888;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-num {
            display: block;
            font-size: 18px;
            color: #21a038;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 700;
            letter-spacing: 1.5px;
        }

        #copy-toast {
            visibility: hidden;
            background-color: #1d1d1f;
            color: #fff;
            border-radius: 50px;
            padding: 12px 24px;
            position: fixed;
            bottom: 30px;
            font-size: 14px;
            opacity: 0;
            transition: 0.3s;
            z-index: 1000;
        }

        #copy-toast.show {
            visibility: visible;
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="support-btn" onclick="copyCard()">
        <span class="top-text">Поддержать❤️</span>
        <span class="mid-text">Номер карты</span>
        <span class="card-num">2202 2063 9370 9519</span>
    </div>

    <div id="copy-toast">Номер скопирован!</div>

    <script>
        function copyCard() {
            const num = "2202206393709519";
            navigator.clipboard.writeText(num).then(() => {
                const toast = document.getElementById("copy-toast");
                toast.classList.add("show");
                setTimeout(() => { toast.classList.remove("show"); }, 2000);
            });
        }
    </script>

</body>
</html>
